#Inspirations: https://github.com/dzlab/dzlab.github.io/blob/master/_config.yml

#Setup
title:        Marcel Castro
tagline:      'Machine Learning'
email:        marcelcastrobr@gmail.com
description: >- # this means to ignore newlines until "baseurl:"
  Personal site to capture my learning path in Machine Learning.
baseurl:      /
url:          https://marcelcastrobr.github.io/notebooks/
#markdown: kramdown

# twitter_username: jekyllrb
github_username:  marcelcastrobr

author:
  name:     'marcelcastrobr'
  
  
paginate:   10

#google_analytics: UA-128961990-1

github:
  repo:           https://github.com/marcelcastrobr


# Build settings
theme: minima
#remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-postfiles
  - jekyll-feed
  - jekyll-gist
  - jekyll-toc
  - jekyll-paginate
  - jekyll-relative-links
  - jekyll-remote-theme

relative_links:
  enabled: true
  collections: true
include:
  - CONTRIBUTING.md
  - README.md

permalink: /:year/:month/:day/:title.html
